<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 수제 도장 시뮬레이터 PRO</title>
    <style>
        /* [폰트 설정] 매니저님 기존 설정 유지 */
        @font-face { font-family: 'B1'; src: url('body1.woff'); }
        @font-face { font-family: 'B2'; src: url('body2.woff'); }
        @font-face { font-family: 'B3'; src: url('body3.woff'); }
        @font-face { font-family: 'B4'; src: url('body4.woff'); }
        @font-face { font-family: 'B5'; src: url('body5.woff'); }
        @font-face { font-family: 'P01'; src: url('p1.woff'); }
        @font-face { font-family: 'P02'; src: url('p2.woff'); }
        @font-face { font-family: 'P03'; src: url('p3.woff'); }
        @font-face { font-family: 'P04'; src: url('p4.woff'); }
        @font-face { font-family: 'P05'; src: url('p5.woff'); }
        @font-face { font-family: 'P06'; src: url('p6.woff'); }
        @font-face { font-family: 'P07'; src: url('p7.woff'); }
        @font-face { font-family: 'P08'; src: url('p8.woff'); }
        @font-face { font-family: 'P09'; src: url('p9.woff'); }
        @font-face { font-family: 'P10'; src: url('p10.woff'); }

        :root { --point-pink: #e91e63; --soft-bg: #fdfafb; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background: var(--soft-bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .store-banner { background: #fff1f6; padding: 15px; border-radius: 15px; margin-bottom: 25px; width: 100%; max-width: 900px; border: 1px solid #ffdae9; text-align: center; box-sizing: border-box; }
        .store-banner a { color: var(--point-pink); text-decoration: none; font-weight: bold; font-size: 16px; }

        .box { background: white; padding: 35px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.06); width: 100%; max-width: 900px; box-sizing: border-box; }
        
        .controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; background: #fafafa; padding: 25px; border-radius: 20px; border: 1px solid #eee; }
        .control-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; align-items: end; }
        
        @media (max-width: 768px) { .control-row { grid-template-columns: 1fr; } }

        label { font-size: 12px; color: #888; margin-bottom: 8px; display: block; font-weight: bold; }
        input, select { padding: 14px; border: 1.5px solid #eee; border-radius: 12px; width: 100%; box-sizing: border-box; font-size: 14px; outline: none; background: #fff; }
        
        .canvas-wrapper { position: relative; line-height: 0; border: 10px solid #fff; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); overflow: hidden; }
        canvas { width: 100%; height: auto; display: block; }
        
        #videoContainer { position: absolute; overflow: hidden; background: #000; z-index: 10; pointer-events: none; border: 4px solid #fff; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        .video-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        .action-area { margin-top: 25px; text-align: center; }
        .main-btn { background: #333; color: #fff; border: none; padding: 18px 60px; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; max-width: 400px; transition: 0.3s; }
        .main-btn:hover { background: #000; }
    </style>
</head>
<body>

<div class="store-banner">
    <a href="https://smartstore.naver.com/your-store" target="_blank">🌸 우리 아이 첫 도장, 정성을 담은 커스텀 디자인 [스토어 구경하기] →</a>
</div>

<div class="box">
    <div class="controls">
        <div class="control-row">
            <div><label>도장 인면 이름 (예: 강호석)</label><input type="text" id="printNameInput" value="강호석" oninput="draw()"></div>
            <div><label>도장 몸통 새김글 (영문/한글)</label><input type="text" id="bodyTextInput" value="STAMP" oninput="draw()"></div>
            <div><label>💎 몸체 각인 폰트</label><select id="bodyFontSelect" onchange="draw()"></select></div>
        </div>
        <div class="control-row">
            <div><label>돌 종류 선택</label><select id="stoneSelect" onchange="changeStone()">
                <option value="stone1">청전석</option><option value="stone2">요녕석</option><option value="stone3">백두석</option><option value="stone4">밀크로즈석</option>
            </select></div>
            <div><label>각인 위치</label><select id="posSelect" onchange="draw()">
                <option value="P1">우측 하단 (전통)</option><option value="P2">중앙 하단 (심플)</option><option value="P3" selected>우측 상단 (감성)</option>
            </select></div>
            <div><label>🔴 인영(도장면) 폰트 (10종)</label><select id="printFontSelect" onchange="draw()"></select></div>
        </div>
        <div class="action-area">
            <button class="main-btn" onclick="draw()">디자인 즉시 반영</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="canvas" width="768" height="1024"></canvas>
        <div id="videoContainer">
            <video id="v1" class="video-player" autoplay loop muted playsinline></video>
        </div>
    </div>

    <div class="action-area" style="margin-top:20px;">
        <button class="main-btn" style="background:#e91e63;" onclick="downloadImage()">디자인 다운로드 받기</button>
    </div>
</div>

<script>
    /** * [매니저 전용 설정 구역] 
     * 수치 기준: 매니저님 최종 캡처본 (chrome_xCru5cEL64.png)
     */
    const CONFIG = {
        print: {
            // 1. 테두리 및 기본 설정
            box_size: 160,      // 도장 전체 크기
            radius: 20,         // 모서리 둥글기
            border_width: 6,    // 테두리 두께
            red_color: "#b03a2e", // 인영 색상
            font_size: 60,      // 글자 크기

            // 2. 도장 전체 위치 (캔버스 좌표)
            relief_x: 200,      // 양각 가로
            relief_y: 680,      // 양각 세로
            intaglio_x: 200,    // 음각 가로
            intaglio_y: 890,    // 음각 세로

            // 3. 내부 글자 개별 조정 (0,0은 도장 정중앙)
            sur_x: -35,         // 성씨 가로 이동
            sur_y: 0,           // 성씨 세로 이동
            given_single_x: 35, // 이름(1자) 가로 이동
            given_single_y: 0,  // 이름(1자) 세로 이동
            given_multi_x: 35,  // 이름(2자) 가로 이동
            given_gap_y: 35     // 이름(2자) 상하 벌어짐 정도
        },
        video: { 
            top: "35px", right: "35px", width: "230px", height: "160px", radius: "15px" 
        }
    };

    const BODY_FONTS = { 'B1': '감성 명조', 'B2': '모던 고딕', 'B3': '정갈한 서체', 'B4': '우아한 필기체', 'B5': '클래식 정체' };
    const PRINT_FONTS = { 'P01':'전서체(전통)','P02':'고인체','P03':'초서체','P04':'예서체','P05':'단정한 한글','P06':'귀여운 서체','P07':'굵은 도장체','P08':'세련된 서체','P09':'클래식 한자','P10':'모던 스탬프' };
    
    const STAMP_SETTINGS = {
        "stone1_P1": { x: 435, y: 740, size: 65, space: 15 }, "stone1_P2": { x: 384, y: 820, size: 65, space: 15 }, "stone1_P3": { x: 445, y: 170, size: 30, space: 5 },
        "stone2_P1": { x: 435, y: 740, size: 65, space: 15 }, "stone2_P2": { x: 384, y: 820, size: 65, space: 15 }, "stone2_P3": { x: 445, y: 170, size: 30, space: 5 },
        "stone3_P1": { x: 435, y: 740, size: 65, space: 15 }, "stone3_P2": { x: 384, y: 820, size: 65, space: 15 }, "stone3_P3": { x: 445, y: 170, size: 30, space: 5 },
        "stone4_P1": { x: 435, y: 740, size: 65, space: 15 }, "stone4_P2": { x: 384, y: 820, size: 65, space: 15 }, "stone4_P3": { x: 445, y: 170, size: 30, space: 5 }
    };

    const STONE_FILES = { "stone1": "stone1.jpg", "stone2": "stone2.jpg", "stone3": "stone3.jpg", "stone4": "stone4.jpg" };
    const VIDEO_MAP = { "stone1": "stone1_process.mp4", "stone2": "stone2_process.mp4", "stone3": "stone3_process.mp4", "stone4": "stone4_process.mp4" };

    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const stoneImg = new Image();
    const video = document.getElementById('v1');

    function init() {
        const vc = document.getElementById('videoContainer');
        Object.assign(vc.style, { top: CONFIG.video.top, right: CONFIG.video.right, width: CONFIG.video.width, height: CONFIG.video.height, borderRadius: CONFIG.video.radius });
        const bSel = document.getElementById('bodyFontSelect'), pSel = document.getElementById('printFontSelect');
        Object.keys(BODY_FONTS).forEach(k => bSel.innerHTML += `<option value="${k}">${BODY_FONTS[k]}</option>`);
        Object.keys(PRINT_FONTS).forEach(k => pSel.innerHTML += `<option value="${k}">${PRINT_FONTS[k]}</option>`);
        document.fonts.ready.then(() => draw());
        changeStone();
    }

    function changeStone() {
        const val = document.getElementById('stoneSelect').value;
        stoneImg.src = STONE_FILES[val];
        video.src = VIDEO_MAP[val];
        video.load();
        video.play().catch(() => { window.addEventListener('mousedown', () => video.play(), {once: true}); });
        stoneImg.onload = draw;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (stoneImg.complete) ctx.drawImage(stoneImg, 0, 0, canvas.width, canvas.height);
        const name = document.getElementById('printNameInput').value;
        const bodyText = document.getElementById('bodyTextInput').value;
        const bFont = document.getElementById('bodyFontSelect').value;
        const pFont = document.getElementById('printFontSelect').value;
        const stone = document.getElementById('stoneSelect').value;
        const pos = document.getElementById('posSelect').value;
        drawBodyStamp(bodyText, bFont, stone, pos);
        renderAdvancedPrint(CONFIG.print.relief_x, CONFIG.print.relief_y, name.charAt(0), name.substring(1), pFont, false);
        renderAdvancedPrint(CONFIG.print.intaglio_x, CONFIG.print.intaglio_y, name.charAt(0), name.substring(1), pFont, true);
    }

    function drawBodyStamp(text, fontKey, stoneKey, posKey) {
        const cfg = STAMP_SETTINGS[`${stoneKey}_${posKey}`];
        ctx.save();
        ctx.fillStyle = "rgba(255, 255, 255, 0.85)"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = `600 ${cfg.size}px '${fontKey}', sans-serif`;
        if (posKey === 'P3') {
            let y = cfg.y;
            text.split('').forEach(char => {
                ctx.save(); ctx.translate(cfg.x, y); ctx.rotate(Math.PI / 2);
                ctx.fillText(char, 0, 0); ctx.restore(); y += cfg.size + cfg.space;
            });
        } else if (posKey === 'P2') {
            let totalW = (text.length * cfg.size) + ((text.length - 1) * cfg.space);
            let startX = cfg.x - (totalW / 2) + (cfg.size / 2);
            text.split('').forEach((char, i) => { ctx.fillText(char, startX + (i * (cfg.size + cfg.space)), cfg.y); });
        } else {
            let y = cfg.y;
            text.split('').forEach(char => { ctx.fillText(char, cfg.x, y); y += cfg.size + cfg.space; });
        }
        ctx.restore();
    }

    function renderAdvancedPrint(x, y, sur, given, fontKey, isNeg) {
        const p = CONFIG.print;
        const drawX = x - (p.box_size / 2), drawY = y - (p.box_size / 2);
        ctx.save();
        ctx.beginPath(); ctx.rect(0, 0, canvas.width, canvas.height); ctx.clip();
        if (isNeg) {
            ctx.fillStyle = p.red_color; fillRRect(drawX, drawY, p.box_size, p.box_size, p.radius); ctx.fill();
            ctx.fillStyle = "#fff";
        } else {
            ctx.strokeStyle = p.red_color; ctx.lineWidth = p.border_width; fillRRect(drawX, drawY, p.box_size, p.box_size, p.radius); ctx.stroke();
            ctx.fillStyle = p.red_color;
        }
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = `${p.font_size}px '${fontKey}'`;
        ctx.fillText(sur || "", x + p.sur_x, y + p.sur_y);
        if(given.length > 1) {
            ctx.fillText(given[0], x + p.given_multi_x, y - p.given_gap_y);
            ctx.fillText(given[1], x + p.given_multi_x, y + p.given_gap_y);
        } else {
            ctx.fillText(given || "", x + p.given_single_x, y + p.given_single_y);
        }
        ctx.restore();
    }

    function fillRRect(x, y, w, h, r) {
        ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = `STAMP_${document.getElementById('printNameInput').value}.jpg`;
        link.href = canvas.toDataURL("image/jpeg", 0.9);
        link.click();
    }
    window.onload = init;
</script>
</body>
</html>
